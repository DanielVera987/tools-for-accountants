<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="cfdi a excel, cfdis, cfdi, convertir cfdi a excel, convertidor de cfdi a excel">
    <meta name="author" content="Daniel Alberto Vera Angulo">
    <title>ClouDav | CFDI a EXCEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">
    <div id="app">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100">
                <div class="col-12 align-self-start">
                    <h1 class="text-center mt-4 mb-0" style='font-family: "Roboto Mono", monospace; font-weight: 700;'>
                        <span style="color: #0075BF;">CFDI</span> a <span style="color: #21a366;">EXCEL</span>
                    </h1>
                </div>

                <div class="col-12">
                    <div class="d-flex justify-content-center align-items-center flex-column w-100">
                        <div v-if="success" class="alert alert-success alert-dismissible fade show mt-3" role="alert" style="max-width: 600px; width: 100%;">
                            <button type="button" class="btn-close" @click="success = ''" aria-label="Close"></button>
                            <strong>{{ success }}</strong>
                        </div>
                        <div v-if="error" class="alert alert-danger alert-dismissible fade show mt-3" role="alert" style="max-width: 600px; width: 100%;">
                            <button type="button" class="btn-close" @click="error = ''" aria-label="Close"></button>
                            <strong>{{ error }}</strong>
                        </div>
                    </div>
                </div>

                <div class="col-12 d-flex justify-content-center align-content-center align-self-baseline">
                    <div class="card" style="max-width: 600px; width: 100%;">
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="filename" class="form-label">Nombre del archivo: (Opcional)</label>
                                <input id="filename" v-model="filename" class="form-control form-control-lg" type="text" placeholder="cfdis">
                            </div>
                            <div class="mb-3">
                                <label for="formFileLg" class="form-label">Sube todos los cfdis (xml) necesarios</label>
                                <input ref="fileInput" @change="handleFiles" class="form-control form-control-lg" id="formFileLg" type="file" multiple accept=".xml,application/xml,text/xml">
                            </div>
                            <div v-if="files.length" class="mb-3 small text-muted">
                                {{ files.length }} archivo(s) seleccionado(s)
                            </div>
                            <div class="mb-3">
                                <button @click="generateExcel" :disabled="!files.length || processing" type="button" class="btn btn-success">
                                    {{ processing ? 'Generando…' : 'Generar Excel' }}
                                </button>
                                <button @click="reset" type="button" class="btn btn-danger ms-2">Reiniciar</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 text-center align-self-end">
                    <div class="mb-4">
                        Hecho con ❤️ en <a href="https://danielvera987.github.io/danielvera" target="_blank">ClouDav</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="js/cfdi.js"></script>
    <script src="js/cfdi-excel-exporter.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
